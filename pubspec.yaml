name: fashion_store_flutter
description: FashionStore - E-commerce de electrónica reacondicionada

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # Supabase
  supabase_flutter: ^2.3.0

  # Stripe
  flutter_stripe: ^10.1.0

  # Freezed / JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilities
  flutter_dotenv: ^5.1.0
  intl: ^0.20.0
  cached_network_image: ^3.3.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.3
  logger: ^2.6.0
  flutter_screenutil: ^5.9.3
  dio: ^5.8.0+1
  http: ^1.1.0

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.2.0
  cupertino_icons: ^1.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  uuid: ^4.5.2
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  app_links: ^6.3.0
  mailer: ^7.1.0
  intl_phone_field: ^3.2.0
  pdf: ^3.11.3
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0
  fl_chart: ^1.1.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator:
  flutter_launcher_icons: ^0.14.4
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/vectors/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
